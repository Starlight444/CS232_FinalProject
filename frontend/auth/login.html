<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>login</title>
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
  <div class="page-bg">
    <div class="main-card">
      <div class="left-panel">
        <img src="picture/login picture.png" alt="" class="login-img">
      </div>
      <div class="right-panel">
        <div class="login-wrapper">
          <p class="dept-title">Department of Computer Science TU</p>
          <div class="login-box">
            <h2>Login</h2>
            <div class="form-group">
              <label>Username</label>
              <input type="text" placeholder="Username" />
            </div>
            <div class="form-group">
              <label>Password</label>
              <div class="input-wrap">
                <input type="password" placeholder="Password" id="pw" />
                <input type="checkbox" id="toggle-check" class="toggle-check">
                <label for="toggle-check" class="toggle-password">
                  <span class="material-symbols-outlined eye-close">visibility_off</span>
                </label>
              </div>
            </div>
            <div class="form-footer">
              <label class="remember-me">
                <input type="checkbox" />
                <span>Remember me</span>
              </label>
              <a href="#" class="forgot-link">Forgot Password?</a>
            </div>
            <button class="login-btn">Log in</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
