<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>login</title>
  <link rel="stylesheet" href="../components/teacher-sidebar-navbar/all.css" />
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
  <div class="main-card">
    <div class="left-panel">
      <img src="picture/login-bk.png" alt="login background" class="login-img">
      <div class="glass-box">
        <img src="picture/tu-logo.png" alt="TU logo" class="tu-logo">
        <span class="cstu-logo">CourseHub</span>
      </div>
    </div>
    <div class="right-panel">
      <div class="login-wrapper">
        <p class="dept-title">Department of Computer Science TU</p>
        <div class="login-box">
          <h2>Login</h2>
          <div class="form-group">
            <label>Enter your email and password</label>
            <input type="email" placeholder="Email" id="email" />
          </div>
          <div class="form-group">
            <div class="input-wrap">
              <input type="password" placeholder="Password" id="pw" />
              <label for="toggle-check" class="toggle-password" onclick="togglePw()">
                <span class="mdi-light--eye"></span>
                <span class="mdi-light--eye-off"></span>
              </label>
            </div>
          </div>
          <div class="form-footer">
            <label class="remember-me">
              <input type="checkbox" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>
          <button class="login-btn" onclick="handleLogin()">Log in</button>
          <p class="error-text" id="error-text"></p>
        </div>
      </div>
    </div>
  </div>
  <!-- Javascript -->
  <script src="login.js"></script>
</body>
</html>
