<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassHub – Teacher Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Amiko:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../components/student-sidebar/sidebar.css">
<link rel="stylesheet" href="../components/student-navbar/student-navbar.css">
<link rel="stylesheet" href="teacher-dashboard.css">
</head>
<body>

<div id="teacher-sidebar-navbar-container"></div>

<div class="main">

  <div class="content">
    <!-- Page Header -->
    <div class="page-header">
      <h1 class="welcome">Welcome back, Instructor</h1>
      <div class="action-btns">
        <button class="action-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M7.5 10H0V7.5H7.5V0H10V7.5H17.5V10H10V17.5H7.5V10Z" fill="white"/>
            <path d="M7.5 10H0V7.5H7.5V0H10V7.5H17.5V10H10V17.5H7.5V10Z" fill="#6E6CDF"/>
          </svg>
          New Assignment
          <svg width="23" height="25" viewBox="0 0 23 25" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.5 25C1.8125 25 1.22417 24.7554 0.735 24.2663C0.245833 23.7771 0.000833333 23.1883 0 22.5V5C0 4.3125 0.245 3.72417 0.735 3.235C1.225 2.74583 1.81333 2.50083 2.5 2.5H7.75C8.02083 1.75 8.47417 1.14583 9.11 0.6875C9.74583 0.229167 10.4592 0 11.25 0C12.0408 0 12.7546 0.229167 13.3913 0.6875C14.0279 1.14583 14.4808 1.75 14.75 2.5H20C20.6875 2.5 21.2763 2.745 21.7663 3.235C22.2563 3.725 22.5008 4.31333 22.5 5V22.5C22.5 23.1875 22.2554 23.7763 21.7663 24.2663C21.2771 24.7563 20.6883 25.0008 20 25H2.5ZM6.25 20H12.5C12.8542 20 13.1513 19.88 13.3913 19.64C13.6313 19.4 13.7508 19.1033 13.75 18.75C13.7492 18.3967 13.6292 18.1 13.39 17.86C13.1508 17.62 12.8542 17.5 12.5 17.5H6.25C5.89583 17.5 5.59917 17.62 5.36 17.86C5.12083 18.1 5.00083 18.3967 5 18.75C4.99917 19.1033 5.11917 19.4004 5.36 19.6413C5.60083 19.8821 5.8975 20.0017 6.25 20ZM6.25 15H16.25C16.6042 15 16.9012 14.88 17.1412 14.64C17.3812 14.4 17.5008 14.1033 17.5 13.75C17.4992 13.3967 17.3792 13.1 17.14 12.86C16.9008 12.62 16.6042 12.5 16.25 12.5H6.25C5.89583 12.5 5.59917 12.62 5.36 12.86C5.12083 13.1 5.00083 13.3967 5 13.75C4.99917 14.1033 5.11917 14.4004 5.36 14.6413C5.60083 14.8821 5.8975 15.0017 6.25 15ZM6.25 10H16.25C16.6042 10 16.9012 9.88 17.1412 9.64C17.3812 9.4 17.5008 9.10333 17.5 8.75C17.4992 8.39667 17.3792 8.1 17.14 7.86C16.9008 7.62 16.6042 7.5 16.25 7.5H6.25C5.89583 7.5 5.59917 7.62 5.36 7.86C5.12083 8.1 5.00083 8.39667 5 8.75C4.99917 9.10333 5.11917 9.40042 5.36 9.64125C5.60083 9.88208 5.8975 10.0017 6.25 10ZM11.9225 3.7975C12.0992 3.62 12.1875 3.39583 12.1875 3.125C12.1875 2.85417 12.0987 2.63042 11.9212 2.45375C11.7437 2.27708 11.52 2.18833 11.25 2.1875C10.98 2.18667 10.7563 2.27542 10.5788 2.45375C10.4013 2.63208 10.3125 2.85583 10.3125 3.125C10.3125 3.39417 10.4013 3.61833 10.5788 3.7975C10.7563 3.97667 10.98 4.065 11.25 4.0625C11.52 4.06 11.7442 3.9725 11.9225 3.7975Z" fill="#6E6CDF"/>
          </svg>

        </button>
        <button class="action-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M7.5 10H0V7.5H7.5V0H10V7.5H17.5V10H10V17.5H7.5V10Z" fill="white"/>
            <path d="M7.5 10H0V7.5H7.5V0H10V7.5H17.5V10H10V17.5H7.5V10Z" fill="#6E6CDF"/>
          </svg>
          New Announcement
          <img src="../assets/icons/teacher-dashboard/announce.svg" alt="Announcement">
        </button>
      </div>
    </div>

    <!-- Dashboard Content -->
    <div class="dashboard-content">

      <!-- TOP SECTION: Left grid + Right grading panel -->
      <div class="top-section">
        <div class="top-left">
          <div class="top-left-grid">
            <div class="calendar-ui">
              <div class="calendar-ui__header">
                <button class="calendar-ui__nav" onclick="changeWeek(-7)">&lt;</button>
                <span id="cui-monthYear" class="calendar-ui__title"></span>
                <button class="calendar-ui__nav" onclick="changeWeek(7)">&gt;</button>
              </div>
              <div class="calendar-ui__week" id="cui-weekGrid"></div>
            </div>
            <div class="stat-card stat-card--row">
              <div>
                <div class="stat-num" id="total-courses-count">--</div>
                <div class="stat-label">Courses</div>
              </div>
              <div class="stat-icon purple">
                <img src="../assets/icons/teacher-dashboard/courses.svg" alt="Courses Icon">
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-top">
                <div class="stat-info-group">
                  <div class="stat-num" id="to-grade-count">--</div>
                  <div class="stat-label">To Grade</div>
                  <div class="stat-sub" id="course-count-label">Loading...</div>
                </div>
                <div class="stat-icon yellow">
                  <img src="../assets/icons/teacher-dashboard/detail.svg" alt="Detail Icon">
                </div>
              </div>
              <div class="progress-percent">
                <div class="progress-bar">
                  <div class="progress-fill" id="grading-progress-bar" style="width: 0%; background: #f97316;"></div>
                </div>
                <div class="progress-pct" id="grading-percentage">0%</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-top">
                <div class="stat-info-group">
                  <div class="stat-num" id="missing-count">--</div>
                  <div class="stat-label">Missing</div>
                  <div class="stat-sub" id="missing-courses-label">Loading ...</div>
                </div>
                <div class="stat-icon pink">
                  <img src="../assets/icons/teacher-dashboard/cross.svg" alt="Cross Icon">
                </div>
              </div>
              <div class="progress-percent">
                <div class="progress-bar">
                  <div class="progress-fill" id="missing-progress-bar" style="width:0%; background:#ef4444;"></div>
                </div>
                <div class="progress-pct" id="missing-percentage">0%</div>
              </div>
            </div>
          </div>
        </div>

        <div class="grading-panel">
          <!-- Header: title | sort controls | badge -->
          <div class="panel-header">
            Needs Grading
            <div class="panel-sort-group" onclick="toggleGradingSort()" title="Toggle sort order">
              <span class="panel-sort-label">Oldest</span>
              <span class="panel-sort-arrow">↑</span>
            </div>
            <span class="badge-num" id="badge-num">--</span>
          </div>

          <!-- Table: sticky header + scrollable card list -->
          <div class="grade-table-wrapper">

            <!-- Column header bar (25px, bg #E1E0F8) -->
            <div class="grade-table-head">
              <div class="gcol-class">Class</div>
              <div class="gcol-name">Assignment Name</div>
              <div class="gcol-submitted">Submitted</div>
              <div class="gcol-missing">Missing</div>
              <div class="gcol-tograde">To Grade</div>
              <div class="gcol-action"></div>
            </div>

            <!-- Scrollable row cards (each 60px tall, gap 10px) -->
            <div class="grade-table-body" id="grading-table-body">

            </div><!-- /grade-table-body -->
          </div><!-- /grade-table-wrapper -->
        </div><!-- /grading-panel -->
      </div><!-- /top-section -->

      <!-- BOTTOM SECTION: Courses (left) | Announcements (right) — side by side via CSS grid 1fr 1fr -->
      <div class="bottom-section">

        <!-- LEFT: Course Cards -->
        <div class="bottom-col">
          <div class="section-title">My Courses</div>
          <div class="course-cards" id="course-container">
            <!-- Populated by JS loadCourses() -->
          </div>
        </div>

        <!-- RIGHT: Announcements -->
        <div class="bottom-col">
          <div class="section-title">Recent Announcement</div>
          <div class="announcements" id="announcements-container"></div>
        </div>

      </div><!-- /bottom-section -->

    </div><!-- /dashboard-content -->
  </div><!-- /content -->
</div><!-- /main -->

<script src="teacher-dashboard.js"></script>
</body>
</html>
