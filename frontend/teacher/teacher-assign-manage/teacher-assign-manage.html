<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS232 - Assignment Grading</title>
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/teacher-sidebar.css">
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/teacher-navbar.css">
    <link rel="stylesheet" href="teacher-assign-manage.css">
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/card-swap-component.css">
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/all.css">
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/buttons.css">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-light">
    <div class="side-nav" id="teacher-sidebar-navbar-container"></div>

    <main class="p-8">
        <div class="max-w-6xl mx-auto">

            <fieldset class="assignment-card">
                <legend>Assignment Info</legend>

                <div class="header-actions">
                    <div class="button-group">
                        <button class="btn btn-outline">
                            <iconify-icon icon="material-symbols:edit-outline-rounded" width="20"
                                height="20"></iconify-icon> Edit
                        </button>
                        <button class="btn btn-outline btn-outline-danger">
                            <iconify-icon icon="tabler:trash" width="24" height="24"></iconify-icon>
                        </button>
                    </div>
                    <div class="points-text mt-2" id="display-points">- Points</div>
                </div>

                <div class="assignment-details">
                    <h1 id="display-title">Loading Title...</h1>
                    <p id="display-due-date">Loading date...</p>

                    <h2>คำสั่ง</h2>
                    <p id="display-instructions">Loading instructions...</p>

                    <h2>Supported Formats</h2>
                    <div id="display-allowed-formats" class="format-badges-group">
                    </div>

                    <h2>File</h2>
                    <div class="file-preview-group mt-2">
                        <div class="file-preview-rect">
                            <p>PDF Document<br><span style="font-size: 0.75rem;" id="display-file-size">-</span></p>
                        </div>
                        <button class="file-btn" type="button">
                            <iconify-icon icon="material-icon-theme:pdf" width="24" height="24"></iconify-icon>
                            <span id="display-file-name">loading_file.pdf</span>
                        </button>
                    </div>
                </div>
            </fieldset>

            <br><br>

            <fieldset class="grading-card">
                <legend>Grading Table Section</legend>

                <div class="tabs-container">
                    <button class="tab-item active" type="button">Needs Grading</button>
                    <button class="tab-item" type="button">Fully Graded</button>
                    <button class="tab-item" type="button">Missing</button>
                </div>

                <div class="search-bar-group">
                    <div class="search-wrapper">
                        <iconify-icon icon="jam:search" class="search-icon" width="20" height="20"></iconify-icon>
                        <input type="search" placeholder="Search">
                    </div>
                </div>

                <br>

                <table class="grading-table">
                    <thead>
                        <tr>
                            <th>Students ID</th>
                            <th>Students Name</th>
                            <th>Turn in Date</th>
                            <th>Status</th>
                            <th>Submissions</th>
                            <th>Grade</th>
                            <th>Feedback</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="table-row">
                            <td>67091111111</td>
                            <td>นางสาวขวัญใจ เมืองน่าน</td>
                            <td>12 Feb 2026</td>
                            <td class="status-cell submitted">
                                <iconify-icon icon="MynauiFileXSolid"></iconify-icon>Submitted
                            </td>
                            <td>
                                <button class="file-btn" type="button">
                                    <span class="icon icon-pdf">picture_as_pdf</span> assign_01.pdf
                                </button>
                            </td>
                            <td><input type="text" class="grade-input" size="3"></td>
                            <td align="center"><button class="feedback-btn" type="button">💬</button></td>
                        </tr>
                    </tbody>
                </table>

                <br>

                <div class="bottom-actions mt-6"
                    style="display: flex; justify-content: space-between; align-items: center;">
                    <button class="btn btn-secondary flex items-center gap-2">
                        <iconify-icon icon="material-symbols:download" width="20" height="20"></iconify-icon>
                        Download All Submissions
                    </button>

                    <div class="button-group" style="display: flex; gap: 10px;">
                        <button class="btn btn-outline" id="edit-grades-btn">
                            <iconify-icon icon="material-symbols:edit-outline-rounded" width="20"
                                height="20"></iconify-icon>Edit
                        </button>
                        <button class="btn btn-primary">
                            Save Grades
                        </button>
                    </div>
                </div>

            </fieldset>

        </div>
    </main>

    <script src="teacher-assign-manage.js"></script>
    <script src="../../components/teacher-sidebar-navbar/teacher-sidebar.js"></script>
</body>

</html>
