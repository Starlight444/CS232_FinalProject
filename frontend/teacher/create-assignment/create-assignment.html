<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Assignment</title>
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/teacher-sidebar.css">
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/teacher-navbar.css">
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/buttons.css">
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/all.css">
    <link rel="stylesheet" href="create-assignment.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>

<body class="bg-light">
    <div class="side-nav" id="teacher-sidebar-navbar-container"></div>
    <main>
        <div class="create-page-container">

            <div class="create-card">
                <button type="button" class="btn-icon-only close-btn" onclick="history.back()" aria-label="Close">
                    <iconify-icon icon="jam:close" width="20" height="20"></iconify-icon>
                </button>
                <div class="card-header">
                    <h2 id="page-title">Create New Assignment</h2>
                </div>

                <form id="create-assignment-form" class="card-body-grid">
                    <div class="col-left">
                        <div class="form-group">
                            <label>Assignment title</label>
                            <input type="text" id="assign-title" class="form-input" placeholder="Assignment 1" required>
                        </div>

                        <div class="form-group">
                            <label>Courses</label>
                            <div class="select-wrapper">
                                <select id="assign-course" class="form-input" required>
                                    <option value="" disabled selected>Select Courses</option>
                                    <option value="cs232">CS232 - Database Systems</option>
                                    <option value="cs261">CS261 - Software Engineering</option>
                                </select>
                                <iconify-icon icon="bx:chevron-down" class="select-icon"></iconify-icon>
                            </div>
                        </div>

                        <div class="form-group flex-grow">
                            <label>Descriptions</label>
                            <textarea id="assign-desc" class="form-input textarea-tall"
                                placeholder="พิมพ์รายละเอียดงาน..." required></textarea>
                        </div>
                    </div>

                    <div class="col-right">
                        <div class="upload-zone" id="drop-zone">
                            <iconify-icon icon="ph:cloud-arrow-up-light" class="upload-icon"></iconify-icon>
                            <p>Drag & drop files or <label for="file-upload" class="browse-link">Browse</label></p>
                            <small>Supported formats: JPG, PNG, MP4, PDF, PSD, AI, Word, PPT, Zip</small>
                            <input type="file" id="file-upload" hidden multiple>
                        </div>

                        <div class="date-points-row">
                            <div class="form-group">
                                <label>Due Date</label>
                                <input type="datetime-local" id="assign-date" class="form-input text-muted" required>
                            </div>
                            <div class="form-group">
                                <label>Points</label>
                                <input type="number" id="assign-points" class="form-input" placeholder="10" min="0"
                                    required>
                            </div>
                        </div>

                        <div class="format-selection-box">
                            <label class="checkbox-row border-bottom">
                                <div class="checkbox-label"><iconify-icon icon="bx:menu-alt-left"
                                        width="20"></iconify-icon> Any</div>
                                <input type="checkbox" id="check-any" checked>
                            </label>
                            <label class="checkbox-row">
                                <div class="checkbox-label"><iconify-icon icon="ph:file-pdf-fill" width="20"
                                        style="color: #EF4444;"></iconify-icon> PDF</div>
                                <input type="checkbox" class="format-check" value="PDF">
                            </label>
                            <label class="checkbox-row">
                                <div class="checkbox-label"><iconify-icon icon="ph:file-doc-fill" width="20"
                                        style="color: #2563EB;"></iconify-icon> Word</div>
                                <input type="checkbox" class="format-check" value="Word">
                            </label>
                            <label class="checkbox-row">
                                <div class="checkbox-label"><iconify-icon icon="ph:image-fill" width="20"
                                        style="color: #38BDF8;"></iconify-icon> Image</div>
                                <input type="checkbox" class="format-check" value="Image">
                            </label>
                            <label class="checkbox-row">
                                <div class="checkbox-label"><iconify-icon icon="ph:file-archive-fill" width="20"
                                        style="color: #333;"></iconify-icon> Zip</div>
                                <input type="checkbox" class="format-check" value="Zip">
                            </label>
                        </div>
                    </div>
                </form>

                <div class="card-footer">
                    <button type="button" class="btn btn-outline btn-cancel"
                        onclick="history.back()">Cancel</button>
                    <button type="submit" id="submit-btn" form="create-assignment-form"
                        class="btn btn-primary btn-post">Post</button>
                </div>
            </div>

        </div>
    </main>
    <script src="create-assignment.js"></script>
    <script src="../../components/teacher-sidebar-navbar/teacher-navbar.js"></script>
</body>

</html>
