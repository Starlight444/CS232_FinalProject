<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Assignment</title>
    
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/card-swap-component.css">
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/buttons.css">
    <link rel="stylesheet" href="../../components/teacher-sidebar-navbar/all.css">
    <link rel="stylesheet" href="create-assignment.css">
    
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body class="bg-light">

    <div class="create-page-container">
        
        <div class="create-card">
            <div class="card-header">
                <div class="spacer"></div> <h2>Create New Assignment</h2>
                <button type="button" class="btn-icon-only close-btn" onclick="history.back()">
                    <iconify-icon icon="jam:close" width="24" height="24"></iconify-icon>
                </button>
            </div>

            <form id="create-assignment-form" class="card-body-grid">
                
                <div class="col-left">
                    <div class="form-group">
                        <label>Assignment title</label>
                        <input type="text" class="form-input" placeholder="Assignment 1" required>
                    </div>

                    <div class="form-group">
                        <label>Courses</label>
                        <div class="select-wrapper">
                            <select class="form-input" required>
                                <option value="" disabled selected>Select Courses</option>
                                <option value="cs232">CS232 - Database Systems</option>
                                <option value="cs261">CS261 - Software Engineering</option>
                            </select>
                            <iconify-icon icon="bx:chevron-down" class="select-icon"></iconify-icon>
                        </div>
                    </div>

                    <div class="form-group flex-grow">
                        <label>Descriptions</label>
                        <textarea class="form-input textarea-tall" placeholder="พิมพ์รายละเอียดงาน..." required></textarea>
                    </div>
                </div>

                <div class="col-right">
                    
                    <div class="upload-zone" id="drop-zone">
                        <iconify-icon icon="ph:cloud-arrow-up-light" class="upload-icon"></iconify-icon>
                        <p>Drag & drop files or <label for="file-upload" class="browse-link">Browse</label></p>
                        <small>Supported formats: JPG, PNG, MP4, PDF, PSD, AI, Word, PPT, Zip</small>
                        <input type="file" id="file-upload" hidden multiple>
                    </div>

                    <div class="date-points-row">
                        <div class="form-group">
                            <label>Due Date</label>
                            <input type="datetime-local" class="form-input text-muted" required>
                        </div>
                        <div class="form-group">
                            <label>Points</label>
                            <input type="number" class="form-input" placeholder="10" min="0" required>
                        </div>
                    </div>

                    <div class="format-selection-box">
                        <label class="checkbox-row border-bottom">
                            <div class="checkbox-label">
                                <iconify-icon icon="bx:menu-alt-left" width="20"></iconify-icon> Any
                            </div>
                            <input type="checkbox" id="check-any" checked>
                        </label>
                        <label class="checkbox-row">
                            <div class="checkbox-label">
                                <iconify-icon icon="ph:file-pdf-fill" width="20" style="color: #EF4444;"></iconify-icon> PDF
                            </div>
                            <input type="checkbox" class="format-check">
                        </label>
                        <label class="checkbox-row">
                            <div class="checkbox-label">
                                <iconify-icon icon="ph:file-doc-fill" width="20" style="color: #2563EB;"></iconify-icon> Word (.doc, .docx)
                            </div>
                            <input type="checkbox" class="format-check">
                        </label>
                        <label class="checkbox-row">
                            <div class="checkbox-label">
                                <iconify-icon icon="ph:image-fill" width="20" style="color: #38BDF8;"></iconify-icon> Image (.jpg, .png)
                            </div>
                            <input type="checkbox" class="format-check">
                        </label>
                        <label class="checkbox-row">
                            <div class="checkbox-label">
                                <iconify-icon icon="ph:file-archive-fill" width="20" style="color: #333;"></iconify-icon> Zip (.zip)
                            </div>
                            <input type="checkbox" class="format-check">
                        </label>
                    </div>

                </div>
            </form>

            <div class="card-footer">
                <button type="submit" form="create-assignment-form" class="btn btn-primary btn-post">Post</button>
            </div>
        </div>

    </div>

    <script src="create-assignment.js"></script>
</body>
</html>
