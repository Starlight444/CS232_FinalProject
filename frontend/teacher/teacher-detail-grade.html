<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade Book Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="teacher-detail-grade.css" />
  <link rel="stylesheet" href="../components/student-sidebar/sidebar.css">
  <link rel="stylesheet" href="../components/student-navbar/student-navbar.css">
</head>
<body>
  <div id="sidebar-placeholder"></div>
  <div id="navbar-placeholder"></div>
  <div class="page">

    <!-- Header row -->
    <div class="page-header">
      <h1 class="page-title">Grade Book</h1>
      <div class="header-actions">
        <div class="search-box">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" placeholder="Search" id="searchInput" />
        </div>
        <button class="filter-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B5CE7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="grade-table">
        <thead>
          <tr>
            <th>Number</th>
            <th>Students ID</th>
            <th>Students Name</th>
            <th>Assignment1</th>
            <th>Assignment2</th>
            <th>Midterm</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

  </div>
  <script src="teacher-detail-grade.js"></script>
</body>
</html>
