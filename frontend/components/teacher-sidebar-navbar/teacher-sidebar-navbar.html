<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Teacher Sidebar and Navbar</title>
    <link rel="stylesheet" href="../student-sidebar/sidebar.css">
    <link rel="stylesheet" href="../student-navbar/student-navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-wrap">
                <img src="../image/tulogo.png" alt="Logo" class="logo-img">
                <span class="brand">CourseHub</span>
            </div>
            <i class="fa-solid fa-bars" id="toggleBtn"></i>
        </div>

        <nav class="nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="#" class="nav-link active" data-page="dashboard">
                        <i class="fa-solid fa-house nav-icon"></i>
                        <span class="nav-label">Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="grading">
                        <i class="fa-solid fa-clipboard nav-icon"></i>
                        <span class="nav-label">Grading Overview</span>
                    </a>
                </li>

                <li class="nav-item" id="courses-item">
                    <a href="#" class="nav-link" id="courseBtn">
                        <i class="fa-solid fa-graduation-cap nav-icon"></i>
                        <span class="nav-label">My courses</span>
                        <i class="fa-solid fa-chevron-right arrow-icon"></i>
                    </a>
                    <ul class="sub-list" id="submenu">
                        <li><a href="#" class="sub-link">CS222</a></li>
                        <li><a href="#" class="sub-link">CS232</a></li>
                        <li><a href="#" class="sub-link">CS242</a></li>
                        <li><a href="#" class="sub-link">CS251</a></li>
                    </ul>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="announcements">
                        <i class="fa-solid fa-bullhorn nav-icon"></i>
                        <span class="nav-label">Announcements</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="#" class="nav-link logout-link">
                <i class="fa-solid fa-right-from-bracket nav-icon"></i>
                <span class="nav-label">Log out</span>
            </a>
        </div>
    </aside>

    <script src="../student-sidebar/sidebar.js"></script>

    <!--Navbar-->
    <div class="navbar">
        <div class="navbar-left"></div>

        <div class="navbar-right">
            <button class="icon-btn profile-btn" id="profile-btn">
                <i class="fa-solid fa-user"></i>
            </button>
            <div class="profile-dropdown" id="profile-dropdown">
                <div class="profile-teacher">
                    <div class="avatar-teacher">S</div>
                    <div class="teacher-details">
                        <p class="teacher-name">ชีวัน วงศ์นคร</p>
                        <p class="teacher-email">shewan.won@dome.tu.ac.th</p>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <script src="teacher-navbar.js"></script>
</body>

</html>
