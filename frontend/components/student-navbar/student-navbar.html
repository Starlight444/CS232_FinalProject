<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Navbar</title>
    <link rel="stylesheet" href="student-navbar.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header class="navbar">
        <!-- Right: Actions -->
        <div class="navbar-right">
            <!-- Notification Bell -->
            <button class="icon-btn bell-btn" id="bell-btn" aria-label="Notifications">
                <i class="fa-solid fa-bell"></i>
                <span class="badge" id="notif-badge">3</span>
            </button>

            <!-- Profile -->
            <button class="icon-btn profile-btn" id="profile-btn" aria-label="Profile">
                <i class="fa-regular fa-user"></i>
            </button>
        </div>

    </header>

</body>

</html>
