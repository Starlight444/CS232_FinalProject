<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sidebar</title>
    <link rel="stylesheet" href="/frontend/components/student-sidebar/sidebar.css">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>

<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-wrap">
                <div id="logo-img" class="logo-img" role="img" aria-label="Logo"></div>
                <span class="brand">CourseHub</span>
            </div>
            <iconify-icon icon="ph:list-bold" id="toggleBtn" width="24" height="24"></iconify-icon>
        </div>

        <nav class="nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="#" class="nav-link active" data-page="home">
                        <iconify-icon icon="ph:house-bold" class="nav-icon" width="24" height="24"></iconify-icon>
                        <span class="nav-label">Home</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="assignments">
                        <iconify-icon icon="ph:clipboard-text-bold" class="nav-icon" width="24" height="24"></iconify-icon>
                        <span class="nav-label">Assignments</span>
                    </a>
                </li>

                <li class="nav-item" id="courses-item">
                    <a href="#" class="nav-link" id="courseBtn">
                        <iconify-icon icon="ph:graduation-cap-bold" class="nav-icon" width="24" height="24"></iconify-icon>
                        <span class="nav-label">My courses</span>
                        <iconify-icon icon="ph:caret-right-bold" class="arrow-icon" width="16" height="16"></iconify-icon>
                    </a>
                    <ul class="sub-list" id="submenu">
                    </ul>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="announcements">
                        <iconify-icon icon="ph:megaphone-simple-bold" class="nav-icon" width="24" height="24"></iconify-icon>
                        <span class="nav-label">Announcements</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="#" class="nav-link logout-link">
                <iconify-icon icon="ph:sign-out-bold" class="nav-icon" width="24" height="24"></iconify-icon>
                <span class="nav-label">Log out</span>
            </a>
        </div>
    </aside>

    <script src="sidebar.js"></script>
</body>

</html>
