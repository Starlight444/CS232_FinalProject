<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Detail Submit</title>
    <link rel="stylesheet" href="../components/student-sidebar/sidebar.css">
    <link rel="stylesheet" href="../components/student-navbar/student-navbar.css">
    <link rel="stylesheet" href="../components/teacher-sidebar-navbar/all.css">
    <link rel="stylesheet" href="../components/teacher-sidebar-navbar/buttons.css">
    <link rel="stylesheet" href="student-assign-submit.css">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>

<body>
    <div id="sidebar-placeholder"></div>
    <div id="navbar-placeholder"></div>

    <main class="main-content">
        <div class="back-btn" id="back-btn" onclick="window.location.href='student-all-assign.html'">
            <img src="../assets/icons/back.svg">
            <p class="back-text">Back</p>
        </div>
        <div class="assignment-card">
            <div class="assign-header">
                <div class="assign-header-left">
                    <p class="assign-returned" id="assign-returned" style="display:none;">
                        <iconify-icon icon="ph:arrow-u-up-left" width="14"></iconify-icon>
                        Returned <span id="assign-returned-date"></span>
                    </p>
                    <h1 class="assign-title">Assignment Title</h1>
                    <p class="assign-due">Due date on WE 11 Mar 26, 11:59 PM</p>
                </div>
                <div class="assign-header-right">
                    <div class="assign-points" id="assign-points">100 Points</div>
                    <div class="assign-grade-top" id="assign-grade-top" style="display:none;">
                        <span class="assign-grade-score" id="assign-grade-score">-</span>
                        <span class="assign-grade-slash">/</span>
                        <span class="assign-grade-max" id="assign-grade-max">-</span>
                        <span class="assign-grade-pts">pts</span>
                    </div>
                </div>
            </div>

            <section class="assign-section">
                <h2 class="section-label">Instructions</h2>
                <p class="section-body">ยายมอยขายหมี ยายมีขายหอย หมียายมอยแหย่หอยยายมี หอยยายมีกัดหมียายมอย</p>
            </section>

            <!-- Attached file -->
            <section class="assign-section">
                <h2 class="section-label">File</h2>
                <div id="teacher-file-container">
                    <p style="color:#aaa;font-size:14px;">No file attached</p>
                </div>
            </section>

            <!-- Supported formats -->
            <section class="assign-section">
                <h2 class="section-label">Supported Formats</h2>
                <div id="display-allowed-formats" class="format-badges-group"></div>
            </section>

            <!-- Student work submit -->
            <section class="assign-section">
                <h2 class="section-label">My Work</h2>
                <div id="my-work-list" class="my-work-list"></div>
                <div class="drop-zone" id="student-drop-zone">
                    <iconify-icon icon="ph:cloud-arrow-up-light" width="40" style="color:#aaa;"></iconify-icon>
                    <p style="margin:8px 0 4px;">Drag &amp; drop files or <label for="file-input"
                            class="browse-link">Browse</label></p>
                    <input type="file" id="file-input" hidden multiple />
                </div>
            </section>

            <!-- Feedback section (shown when graded) -->
            <section class="assign-section grade-section" id="grade-section" style="display:none;">
                <h2 class="section-label">Feedback</h2>
                <div class="grade-feedback-box">
                    <p class="grade-feedback-text" id="grade-feedback-text">ไม่มี feedback</p>
                </div>
            </section>

        </div>

        <!-- Submit bar -->
        <div class="submit-bar">
            <button class="cancel-btn" id="cancel-btn" style="display:none;">Cancel</button>
            <button class="submit-btn" id="submit-btn">Submit</button>
        </div>
    </main>

    <script src="student-assign-submit.js"></script>
</body>

</html>
