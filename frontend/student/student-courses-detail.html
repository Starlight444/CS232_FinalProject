<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Course</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiko:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="student-courses-detail.css" />
    <link rel="stylesheet" href="../components/student-navbar/student-navbar.css" />
    <link rel="stylesheet" href="../components/student-sidebar/sidebar.css" />
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
    <div id="sidebar-container"></div>
    <div id="student-navbar-container"></div>

    <main class="main">
        
        <div class="content">

            <div class="content-header">
                <h1 class="page-title">My Courses</h1>
            </div>

            <div class="tab-table-container">
                <div class="tab-navigation" id="tab-nav">
                    <!-- Sliding indicator — moved by JS -->
                    <div class="tab-indicator" id="tab-indicator"></div>

                    <!-- Materials -->
                    <button class="tab-btn" onclick="switchTab(this, 'materials')">
                        <iconify-icon icon="ph:files-bold" width="24" height="24"></iconify-icon>
                        Materials
                    </button>

                    <!-- Assignments -->
                    <button class="tab-btn active" onclick="switchTab(this, 'assignments')">
                        <iconify-icon icon="ph:assignment-bold" width="20" height="20"></iconify-icon>
                        <span>Assignments (<span id="assignment-count">0</span>)</span>
                    </button>

                    <!-- Announcements -->
                    <button class="tab-btn" onclick="switchTab(this, 'announcements')">
                        <iconify-icon icon="ph:megaphone-bold" width="24" height="24"></iconify-icon>
                        Announcements
                    </button>

                    <!-- People -->
                    <button class="tab-btn" onclick="switchTab(this, 'people')">
                        <iconify-icon icon="ph:users-bold" width="24" height="24"></iconify-icon>
                        People
                    </button>
                </div>

                <div class="tab-content-body">
                    <div id="assignments" class="tab-panel active">
                        <div class="assignment-list" id="assignment-list-container">

                            <div class="time-group" id="group-today">
                                <div class="time-group-header">
                                    <iconify-icon icon="ph:clock-bold" width="24" height="24" style="color: rgba(0,0,0,0.5);"></iconify-icon>
                                    <h3 class="group-label today">Due today</h3>
                                </div>
                                <div class="assignment-cards" id="list-today"></div>
                            </div>

                            <div class="time-group" id="group-overdue">
                                <div class="time-group-header">
                                    <iconify-icon icon="ph:warning-circle-bold" width="24" height="24" style="color: rgba(0,0,0,0.5);"></iconify-icon>
                                    <h3 class="group-label overdue">Overdue</h3>
                                </div>
                                <div class="assignment-cards" id="list-overdue"></div>
                            </div>

                            <div class="time-group" id="group-upcoming">
                                <div class="time-group-header">
                                    <iconify-icon icon="ph:calendar-blank-bold" width="24" height="24" style="color: rgba(0,0,0,0.5);"></iconify-icon>
                                    <h3 class="group-label upcoming">Upcoming</h3>
                                </div>
                                <div class="assignment-cards" id="list-upcoming"></div>
                            </div>

                            <div class="time-group" id="group-complete">
                                <div class="time-group-header">
                                    <iconify-icon icon="ph:check-circle-bold" width="24" height="24" style="color: rgba(0,0,0,0.5);"></iconify-icon>
                                    <h3 class="group-label complete">Complete</h3>
                                </div>
                                <div class="assignment-cards" id="list-complete"></div>
                            </div>

                        </div>
                    </div>

                    <div id="materials" class="tab-panel">
                        <div class="materials-container" id="materials-list"></div>
                    </div>
                    <div id="announcements" class="tab-panel">
                        <div class="announcement-list" id="announcement-list">
                            <div class="empty-state">Loading announcements...</div>
                        </div>
                    </div>
                    <div id="people" class="tab-panel">
                        <div id="member-list"></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="student-courses-detail.js"></script>
</body>
</html>
