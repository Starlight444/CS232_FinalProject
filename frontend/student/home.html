<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="../components/student-sidebar/sidebar.css">
  <link rel="stylesheet" href="../components/student-navbar/student-navbar.css">
  <link rel="stylesheet" href="../student/home.css">
  <link rel="stylesheet" href="../components/teacher-sidebar-navbar/all.css">
  <link rel="stylesheet" href="../components/teacher-sidebar-navbar/buttons.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>

<body>
  <div id="sidebar-placeholder"></div>
  <div id="navbar-placeholder"></div>
  <div class="layout">


    <!-- Main -->
    <div class="main">

      <!-- Content -->
      <div class="content">
        <!-- Left stack: title + assignments -->
        <div class="left-col">
          <div class="home-title-row">
            <div class="page-title">Welcome, Student</div>
            <button class="sync-btn" id="sync-btn" type="button" title="Sync external data">
              <iconify-icon icon="ph:arrows-clockwise-bold" width="18" height="18"></iconify-icon>
              Sync
            </button>
          </div>
          <!-- Center -->
          <div class="center-col">
            <div class="assignment-card">
            <div class="assignment-title">Assignmment</div>
            <div class="stats-row">
              <div class="stat-item due-today active-stat">
                <div class="stat-num"></div>
                <div class="stat-label">Due Today</div>
              </div>
              <div class="stat-item upcoming">
                <div class="stat-num"></div>
                <div class="stat-label">Upcoming</div>
              </div>
              <div class="stat-item overdue">
                <div class="stat-num"></div>
                <div class="stat-label">Overdue</div>
              </div>
              <div class="stat-item complete">
                <div class="stat-num"></div>
                <div class="stat-label">Complete</div>
              </div>
            </div>
            <!-- Assignments list -->
            <div class="assign-list">
            </div>
          </div>
          </div>
        </div>

        <!-- Right -->
        <div class="right-col">
          <!-- Calendar -->
          <div class="calendar-card">
            <div class="calendar-title">Upcoming Deadlines</div>
            <div class="cal-header">
              <button class="cal-nav"><iconify-icon icon="ph:caret-left-bold" width="20" height="20"></iconify-icon></button>
              <span class="cal-month"></span>
              <button class="cal-nav"><iconify-icon icon="ph:caret-right-bold" width="20" height="20"></iconify-icon></button>
            </div>
            <div class="cal-grid"></div>
          </div>

          <!-- Announcements -->
          <div class="ann-card">
            <div class="ann-title">Recent Announcements</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
<script src="scraper-merge.js"></script>
<script src="home.js"></script>

</html>
